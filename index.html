<script>
let running = false;
let workers = [];
let frameId;
let memInterval;

const WORKER_COUNT = (navigator.hardwareConcurrency || 4) * 2; // oversubscribe CPU
const RAM_TARGET_MB = 1500; // push RAM HARD
const DOM_LIMIT = 8000;

let ram = [];
let domNodes = [];

// ===== CPU MAX LOAD =====
function startWorkers() {
    const code = `
        function burn() {
            let x = 0;
            for (let i = 0; i < 2e7; i++) {
                x += Math.sqrt(i * Math.random()) * Math.sin(i);
            }
            return x;
        }
        while (true) burn();
    `;

    for (let i = 0; i < WORKER_COUNT; i++) {
        const blob = new Blob([code], {type: 'application/javascript'});
        workers.push(new Worker(URL.createObjectURL(blob)));
    }

    document.getElementById("workers").textContent = workers.length;
}

// ===== GPU HARD LOAD =====
function startGPU() {
    const canvas = document.getElementById("c");
    const gl = canvas.getContext("webgl");

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    let verts = new Float32Array(40000); // WAY more vertices
    for (let i = 0; i < verts.length; i++) {
        verts[i] = Math.random() * 2 - 1;
    }

    let buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);

    let last = performance.now();
    let frames = 0;

    function loop() {
        if (!running) return;

        for (let i = 0; i < verts.length; i++) {
            verts[i] += (Math.random() - 0.5) * 0.02;
        }

        gl.bufferData(gl.ARRAY_BUFFER, verts, gl.DYNAMIC_DRAW);
        gl.clear(gl.COLOR_BUFFER_BIT);

        frames++;
        let now = performance.now();
        if (now - last > 1000) {
            document.getElementById("fps").textContent = frames;
            frames = 0;
            last = now;
        }

        frameId = requestAnimationFrame(loop);
    }

    loop();
}

// ===== RAM PRESSURE =====
function startMemory() {
    memInterval = setInterval(() => {
        if (!running) return;

        let currentMB = ram.length * 8; // rough estimate

        if (currentMB < RAM_TARGET_MB) {
            ram.push(new Float64Array(50000)); // heavy block
        }

        if (performance.memory) {
            document.getElementById("memory").textContent =
                (performance.memory.usedJSHeapSize / 1048576).toFixed(0);
        }
    }, 50);
}

// ===== DOM CHAOS =====
function startDOM() {
    function spam() {
        if (!running) return;

        for (let i = 0; i < 20; i++) {
            let d = document.createElement("div");
            d.style.position = "absolute";
            d.style.left = Math.random() * innerWidth + "px";
            d.style.top = Math.random() * innerHeight + "px";
            d.style.width = "4px";
            d.style.height = "4px";
            d.style.background = "#0f0";

            document.body.appendChild(d);
            domNodes.push(d);
        }

        if (domNodes.length > DOM_LIMIT) {
            for (let i = 0; i < 50; i++) {
                let old = domNodes.shift();
                if (old) old.remove();
            }
        }

        setTimeout(spam, 1);
    }

    spam();
}

// ===== CONTROL =====
function start() {
    if (running) return;
    running = true;

    startWorkers();
    startGPU();
    startMemory();
    startDOM();
}

function stop() {
    running = false;

    workers.forEach(w => w.terminate());
    workers = [];

    cancelAnimationFrame(frameId);
    clearInterval(memInterval);

    domNodes.forEach(d => d.remove());
    domNodes = [];
    ram = [];

    document.getElementById("workers").textContent = 0;
}
</script>
