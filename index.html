<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balanced Stress Test</title>
<style>
    body {
        margin: 0;
        background: #000;
        color: #0f0;
        font-family: monospace;
        overflow: hidden;
    }
    .ui {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.8);
        padding: 12px;
        border-radius: 8px;
        z-index: 10;
    }
    button {
        margin: 4px;
        padding: 6px 10px;
        background: #111;
        color: #0f0;
        border: 1px solid #0f0;
        cursor: pointer;
    }
    canvas {
        width: 100vw;
        height: 100vh;
        display: block;
    }
</style>
</head>
<body>

<div class="ui">
    <div>FPS: <span id="fps">0</span></div>
    <div>Workers: <span id="workers">0</span></div>
    <div>Memory: <span id="memory">0</span> MB</div>
    <button onclick="start()">START</button>
    <button onclick="stop()">STOP</button>
</div>

<canvas id="c"></canvas>

<script>
let running = false;
let workers = [];
let frameId;
let memInterval;

const WORKER_COUNT = navigator.hardwareConcurrency || 4;
const MAX_RAM_BLOCKS = 300;
const DOM_LIMIT = 3000;

let ram = [];
let domNodes = [];

// ===== CPU STRESS (MULTI-CORE) =====
function startWorkers() {
    const code = `
        function heavy() {
            let x = 0;
            for (let i = 0; i < 5e6; i++) {
                x += Math.sqrt(i * Math.random());
            }
            return x;
        }
        while (true) heavy();
    `;

    for (let i = 0; i < WORKER_COUNT; i++) {
        const blob = new Blob([code], {type: 'application/javascript'});
        const w = new Worker(URL.createObjectURL(blob));
        workers.push(w);
    }

    document.getElementById("workers").textContent = workers.length;
}

// ===== GPU STRESS (WEBGL) =====
function startGPU() {
    const canvas = document.getElementById("c");
    const gl = canvas.getContext("webgl");

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    let verts = new Float32Array(12000);
    for (let i = 0; i < verts.length; i++) {
        verts[i] = Math.random() * 2 - 1;
    }

    let buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);

    let last = performance.now();
    let frames = 0;

    function loop() {
        if (!running) return;

        for (let i = 0; i < verts.length; i++) {
            verts[i] += (Math.random() - 0.5) * 0.01;
        }

        gl.bufferData(gl.ARRAY_BUFFER, verts, gl.DYNAMIC_DRAW);
        gl.clear(gl.COLOR_BUFFER_BIT);

        frames++;
        let now = performance.now();
        if (now - last > 1000) {
            document.getElementById("fps").textContent = frames;
            frames = 0;
            last = now;
        }

        frameId = requestAnimationFrame(loop);
    }

    loop();
}

// ===== RAM STRESS (CONTROLLED) =====
function startMemory() {
    memInterval = setInterval(() => {
        if (!running) return;

        if (ram.length < MAX_RAM_BLOCKS) {
            ram.push(new Float64Array(20000));
        } else {
            ram.shift();
        }

        if (performance.memory) {
            document.getElementById("memory").textContent =
                (performance.memory.usedJSHeapSize / 1048576).toFixed(1);
        }
    }, 100);
}

// ===== DOM STRESS =====
function startDOM() {
    function spawn() {
        if (!running) return;

        let d = document.createElement("div");
        d.style.position = "absolute";
        d.style.left = Math.random() * innerWidth + "px";
        d.style.top = Math.random() * innerHeight + "px";
        d.style.width = "5px";
        d.style.height = "5px";
        d.style.background = "#0f0";

        document.body.appendChild(d);
        domNodes.push(d);

        if (domNodes.length > DOM_LIMIT) {
            let old = domNodes.shift();
            old.remove();
        }

        setTimeout(spawn, 5);
    }

    spawn();
}

// ===== CONTROL =====
function start() {
    if (running) return;
    running = true;

    startWorkers();
    startGPU();
    startMemory();
    startDOM();
}

function stop() {
    running = false;

    workers.forEach(w => w.terminate());
    workers = [];

    cancelAnimationFrame(frameId);
    clearInterval(memInterval);

    domNodes.forEach(d => d.remove());
    domNodes = [];
    ram = [];

    document.getElementById("workers").textContent = 0;
}
</script>

</body>
</html>
