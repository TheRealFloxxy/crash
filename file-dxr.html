<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome OS Stress Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: monospace;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .info {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h2>Chrome OS Stress Test</h2>
            <p>Memory: <span id="memory">0</span> MB</p>
            <p>FPS: <span id="fps">0</span></p>
            <p>Workers: <span id="workers">0</span></p>
            <button onclick="startMemoryLeak()">Memory Leak</button>
            <button onclick="startCanvasStress()">Canvas Stress</button>
            <button onclick="startWorkerFork()">Worker Fork Bomb</button>
            <button onclick="startDOMStress()">DOM Stress</button>
            <button onclick="startAll()">Start All</button>
        </div>
        <canvas class="canvas" id="stressCanvas"></canvas>
    </div>

    <script>
        let memoryInterval;
        let canvasAnimation;
        let workers = [];
        let domElements = [];
        
        // Memory leak simulation
        function startMemoryLeak() {
            let leakArray = [];
            memoryInterval = setInterval(() => {
                for(let i = 0; i < 10000; i++) {
                    leakArray.push(new Array(1000).fill(Math.random()));
                }
                document.getElementById('memory').textContent = 
                    (performance.memory ? performance.memory.usedJSHeapSize / 1048576 : 'N/A');
            }, 100);
        }
        
        // Canvas stress test
        function startCanvasStress() {
            const canvas = document.getElementById('stressCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];
            for(let i = 0; i < 10000; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 5 + 1,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`
                });
            }
            
            let lastTime = performance.now();
            let frameCount = 0;
            
            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                frameCount++;
                const currentTime = performance.now();
                if(currentTime - lastTime >= 1000) {
                    document.getElementById('fps').textContent = frameCount;
                    frameCount = 0;
                    lastTime = currentTime;
                }
                
                canvasAnimation = requestAnimationFrame(animate);
            }
            animate();
        }
        
        // Worker fork bomb
        function startWorkerFork() {
            const workerCode = `
                while(true) {
                    const worker = new Worker(URL.createObjectURL(new Blob([\`(${arguments.callee.toString()})()\`], {type: 'application/javascript'})));
                }
            `;
            
            for(let i = 0; i < 10; i++) {
                const blob = new Blob([workerCode], {type: 'application/javascript'});
                const worker = new Worker(URL.createObjectURL(blob));
                workers.push(worker);
            }
            
            document.getElementById('workers').textContent = workers.length;
        }
        
        // DOM stress test
        function startDOMStress() {
            const container = document.querySelector('.container');
            
            function createElement() {
                const div = document.createElement('div');
                div.style.position = 'absolute';
                div.style.left = Math.random() * window.innerWidth + 'px';
                div.style.top = Math.random() * window.innerHeight + 'px';
                div.style.width = '10px';
                div.style.height = '10px';
                div.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                container.appendChild(div);
                domElements.push(div);
                
                if(domElements.length > 10000) {
                    const old = domElements.shift();
                    old.remove();
                }
            }
            
            for(let i = 0; i < 1000; i++) {
                setTimeout(createElement, i * 10);
            }
        }
        
        // Start all stress tests
        function startAll() {
            startMemoryLeak();
            startCanvasStress();
            startWorkerFork();
            startDOMStress();
        }
        
        // Auto-start after 2 seconds
        setTimeout(startAll, 2000);
    </script>
</body>
</html>
